name: BDGW VaultFlow — Codex Production Fix

on:
  workflow_dispatch:

jobs:
  codex-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Verify Codex installed
        run: codex --version

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
        continue-on-error: true

      - name: Verify spec file exists
        run: |
          if [ ! -f "BDGW_VAULTFLOW_MASTER_REFERENCE_v1.0.txt" ]; then
            echo "ERROR: Spec file not found in repo root"
            exit 1
          fi
          echo "Spec file found. Lines: $(wc -l < BDGW_VAULTFLOW_MASTER_REFERENCE_v1.0.txt)"

      - name: Verify fix prompt exists
        run: |
          if [ ! -f "CODEX_MASTER_FIX_PROMPT.txt" ]; then
            echo "ERROR: Fix prompt not found in repo root"
            exit 1
          fi
          echo "Fix prompt found."

      - name: Run Codex production fix pass
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          codex -a never exec -s workspace-write "$(cat CODEX_MASTER_FIX_PROMPT.txt)"

      - name: Verify syntax after fix
        run: |
          echo "Running syntax check on all Python files..."
          find app -name "*.py" -exec python -m py_compile {} \;
          echo "Syntax check passed."

      - name: Check for leftover aiogram imports
        run: |
          echo "Checking for aiogram references..."
          if grep -r "aiogram" app/ --include="*.py" -l; then
            echo "WARNING: aiogram references still found"
          else
            echo "Clean — no aiogram references"
          fi

      - name: Check for blocking sleep calls
        run: |
          echo "Checking for time.sleep in async code..."
          if grep -rn "time\.sleep" app/ --include="*.py"; then
            echo "WARNING: blocking sleep calls found"
          else
            echo "Clean — no blocking sleep"
          fi

      - name: Configure git
        run: |
          git config user.name "Codex Fix Bot"
          git config user.email "codex@bdgw.bot"

      - name: Commit and push fixes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit — repo already clean"
          else
            git commit -m "fix: codex production fix pass — spec compliance, crash fixes, async safety

- All aiogram references replaced with Pyrogram
- Missing imports added across all handlers
- Queue state machine corrected
- TXID uniqueness index enforced
- Support session ownership lock enforced
- Album hash fingerprinting added
- Anonymous moderation removed
- Roles reduced to OWNER/ADMIN only
- Watermark before enqueue enforced
- FloodWait handling added throughout
- Bare except blocks eliminated
- time.sleep replaced with asyncio.sleep
- All DB indexes created on startup
- MongoDB writes before Telegram sends enforced"
            git push origin HEAD
            echo "Pushed successfully"
          fi

      - name: Summary
        run: |
          echo "=============================="
          echo "Fix pass complete"
          echo "Files changed:"
          git diff HEAD~1 --name-only 2>/dev/null || echo "(first commit or no changes)"
          echo "=============================="
