version: "3.9"

services:
  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./sessions:/app/sessions
      - ./processed:/app/processed
      - ./watermark_cache:/app/watermark_cache
      - ./assets:/app/assets
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_data:
