[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["ffmpeg", "python311"]

[deploy]
startCommand = "python main_bot.py"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
sleepApplication = false

[deploy.healthcheck]
type = "command"
command = "python -c \"import app; print('ok')\""
